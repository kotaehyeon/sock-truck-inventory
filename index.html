<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>양말트럭 재고관리</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="lock-screen">
    <input type="password" id="password-input" placeholder="비밀번호" />
    <button id="unlock-button">입장</button>
    <p id="lock-error" class="error"></p>
  </div>

  <div id="app" hidden>
    <nav id="nav-bar">
      <button data-route="slots">매대뷰</button>
      <button data-route="inventory">재고입력</button>
      <button data-route="orders">발주목록</button>
      <button data-route="products">상품관리</button>
      <button data-route="settings">설정</button>
    </nav>
    <p id="sync-status"></p>
    <main id="view-container"></main>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
